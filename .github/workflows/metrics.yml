name: Metrics
on:
  # ververst elke nacht + handmatig + bij elke push naar main
  schedule: [{ cron: "0 4 * * *" }]
  workflow_dispatch:
  push: { branches: ["main"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # PAT (classic) met scopes:  repo  +  read:org
          # opslaan als repo-secret onder de naam METRICS_TOKEN
          token: ${{ secrets.METRICS_TOKEN }}

          # KERN VAN DE FIX: haal niet alleen je eigen repos op, maar ook
          # die van orgs waar je lid van bent (Bringon, aresapp) en repos
          # waar je collaborator bent. Standaard is dit alleen 'owner'.
          repositories_affiliations: owner, collaborator, organization_member
          repositories: 200

          # alleen de languages-kaart genereren -> metrics.languages.svg
          filename: metrics.languages.svg
          base: ""

          plugin_languages: yes
          # diepte-modus: cloont repos en telt ALLEEN jouw commits,
          # ook in privé- en org-repos (Bringon, aresapp, ...)
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          # ruimere analyse-timeouts zodat grote repos (Bringon) niet
          # stilletjes worden afgekapt in indepth-modus (minuten)
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 10
          # Forceer expliciet de org-repos in de indepth-analyse. Dit is
          # tegelijk een toets: als het token deze NIET mag clonen, zie je
          # in de logs een clone-fout -> dan is het een toegang/SSO-probleem.
          # Pas de namen aan naar de echte repo's (check github.com/Bringon).
          plugin_languages_indepth_custom: |-
            Bringon/BringOn-Backend
            Bringon/BringOn-Frontend
            aresapp/site
          # Zet tijdelijk op 'yes' om in de logs te zien welke repos worden
          # opgehaald en geanalyseerd (logs worden wel veel groter).
          debug: no
          # markup/config-talen wegfilteren zodat C#/TS/Python bovenaan staan
          plugin_languages_ignored: >-
            html, css, scss, tex, dockerfile, makefile, shell,
            jupyter notebook, hcl, procfile

          # KRITISCH: zo herkent metrics welke commits van jou zijn.
          # Elk naam/username/e-mailadres waarmee je commit.
          commits_authoring: >-
            Vincent Witte, Dufius,
            vincent.witte@gmail.com, vincent@bringon.io

          config_timezone: Europe/Amsterdam
